<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Atualizações • Amigos Solidários</title>

   <!--CloudFlare e API's-->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

   <!--Styles-->
  <link rel="stylesheet" href="src/styles/global.css">
  <link rel="stylesheet" href="src/styles/navbar.css">
  <link rel="stylesheet" href="src/styles/atualizacoes.css">

</head>
<body>
  <div class="toast-container" id="toastContainer"></div>

  <header>
    <nav id="navbar">
       <a href="https://voluntariosdasaude.com.br/">
        <img src="src/img/Amigos Solidários.png" alt="Amigos Solidários" class="nav_img">
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul id="nav_list">
        <li class="nav-item"><a href="eventos.html">Eventos</a></li>
        <li class="nav-item active"><a href="atualizacoes.html">Atualizações</a></li>
        <li class="nav-item "><a href="balancete.html">Transparência</a></li>
        <li class="nav-item"><a href="dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a href="register.html">Usuários</a></li>
      </ul>
    </nav>
  </header>

  <div class="container">
    <div class="page-header">
      <h1><i class="fas fa-bell"></i> Gerenciar Atualizações</h1>
      <p>Publique, edite e remova atualizações exibidas no site.</p>
    </div>

    <div class="grid-container">
      <!-- Formulário -->
      <div class="form-panel">
        <h2><i class="fas fa-plus-circle"></i> Nova Atualização</h2>
        <form id="atualizacaoForm">
          <div class="form-group">
            <label for="texto">Texto da atualização *</label>
            <input type="text" id="texto" name="texto" placeholder="Ex: Hoje realizamos uma ação incrível..." required>
          </div>
          <div class="form-group">
            <label for="imagem">Imagem (opcional)</label>
            <input type="file" id="imagem" name="file-1" accept="image/*">
          </div>
          <div class="btn-group">
            <button type="submit" class="btn-publicar" id="btnSubmit">
              <i class="fas fa-paper-plane"></i>
              <span id="btnText">Publicar Atualização</span>
            </button>
            <button type="button" id="cancelEdit" class="btn-cancel">
              <i class="fas fa-times"></i> Cancelar
            </button>
          </div>
        </form>
      </div>

      <!-- Lista -->
      <div class="list-panel">
        <h2>
          <i class="fas fa-list"></i> Publicadas
          <span class="count-badge" id="countBadge">0</span>
        </h2>
        <div id="atualizacoes">
          <div class="loading"><div class="loading-ring"></div><p>Carregando...</p></div>
        </div>
      </div>
    </div>
  </div>

  <script src="src/scripts/atualizacoes.js"></script>
</body>
</html>
