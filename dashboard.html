<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard • Formulários Recebidos</title>
  
   <!--CloudFlare e API's-->
  <script src="https://unpkg.com/feather-icons"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!--Styles-->
  <link rel="stylesheet" href="src/styles/global.css">
  <link rel="stylesheet" href="src/styles/navbar.css">
  <link rel="stylesheet" href="src/styles/dashbord.css">
</head>

<body>
  <div class="toast-container" id="toastContainer"></div>

  <header>
    <nav id="navbar">
       <a href="https://voluntariosdasaude.com.br/">
        <img src="src/img/Amigos Solidários.png" alt="Amigos Solidários" class="nav_img"></a>
      <button class="nav-toggle" id="navToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <ul id="nav_list">
        <li class="nav-item"><a href="eventos.html">Eventos</a></li>
        <li class="nav-item"><a href="atualizacoes.html">Atualizações</a></li>
        <li class="nav-item"><a href="balancete.html">Transparência</a></li>
        <li class="nav-item active"><a href="dashboard.html">Dashboard</a></li>
        <li class="nav-item "><a href="register.html">Usuários</a></li>
      </ul>
    </nav>
  </header>

  <!-- Barra de Filtros -->
  <div class="filter-bar">
    <button onclick="carregarFormularios()" class="btn-refresh" title="Recarregar">
      <i data-feather="refresh-cw"></i> Recarregar
    </button>

    <div class="filter-search">
      <i data-feather="search"></i>
      <input type="text" id="buscaEmail" placeholder="Buscar por e-mail..." oninput="aplicarFiltros()" />
      <button class="btn-clear-search" id="btnLimparBusca" onclick="limparBusca()" title="Limpar">
        <i data-feather="x"></i>
      </button>
    </div>

    <div class="filter-controls">
      <span class="filter-label">Ordenar:</span>
      <button class="btn-filter" id="btnData" onclick="ordenarPor('data')" title="Por data">
        <i data-feather="calendar"></i> Data <span class="sort-icon" id="iconData">↓</span>
      </button>
      <button class="btn-filter" id="btnAlfabetico" onclick="ordenarPor('alfabetico')" title="Alfabético">
        <i data-feather="type"></i> A–Z <span class="sort-icon" id="iconAlfabetico">↑</span>
      </button>
      <button class="btn-filter btn-reset" onclick="resetarFiltros()" title="Padrão">
        <i data-feather="sliders"></i> Padrão
      </button>
    </div>
  </div>

  <!-- Lista de Formulários -->
  <div class="page-content">
    <div id="lista"></div>

    <!-- Enviar Email -->
    <div class="email-section">
      <h2><i data-feather="send"></i> Enviar Resposta por E-mail</h2>
      <div class="email-grid">
        <div>
          <label>Destinatário</label>
          <input type="email" id="emailDestino" placeholder="exemplo@dominio.com" />
        </div>
        <div>
          <label>Assunto</label>
          <input type="text" id="assunto" placeholder="Ex: Agradecemos seu interesse!" />
        </div>
        <div class="full-width">
          <label>Mensagem</label>
          <textarea id="mensagem" rows="5" placeholder="Escreva aqui a resposta..."></textarea>
        </div>
      </div>
      <div class="email-actions">
        <button onclick="enviarEmail()" class="btn-send-email">
          <i data-feather="mail"></i> Enviar E-mail
        </button>
      </div>
    </div>
  </div>

  <script src="src/scripts/dashboard.js"></script>
</body>
</html>
